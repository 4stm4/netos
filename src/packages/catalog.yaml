# 4stm4 netOS — Buildroot package catalog
#
# Each group is a named set of BR2_PACKAGE_*=y lines.
# Groups can be selected via --groups on the CLI or via catalog.resolve_groups().
#
# Default build uses groups listed in netos_build/catalog.py DEFAULT_GROUPS.
version: 1

groups:

  core:
    description: "Minimal core utilities — always included"
    packages:
      - BR2_PACKAGE_BUSYBOX=y
      - BR2_PACKAGE_BUSYBOX_SHOW_OTHERS=y
      - BR2_PACKAGE_BASH=y
      - BR2_PACKAGE_CA_CERTIFICATES=y
      - BR2_PACKAGE_GIT=y
      - BR2_PACKAGE_LIBCURL=y
      - BR2_PACKAGE_LIBCURL_CURL=y
      - BR2_PACKAGE_LIBCURL_OPENSSL=y
      - BR2_PACKAGE_SOCAT=y

  networking:
    description: "Network management and filtering tools"
    packages:
      - BR2_PACKAGE_IPROUTE2=y
      - BR2_PACKAGE_IPSET=y
      - BR2_PACKAGE_NFTABLES=y
      - BR2_PACKAGE_NFTABLES_JSON=y
      - BR2_PACKAGE_CONNTRACK_TOOLS=y
      - BR2_PACKAGE_WIREGUARD_TOOLS=y
      - BR2_PACKAGE_DNSMASQ=y
      - BR2_PACKAGE_ETHTOOL=y

  monitoring:
    description: "Network and system monitoring tools"
    packages:
      - BR2_PACKAGE_VNSTAT=y
      - BR2_PACKAGE_TCPDUMP=y
      - BR2_PACKAGE_IFTOP=y
      - BR2_PACKAGE_NETHOGS=y
      - BR2_PACKAGE_SYSSTAT=y

  dns:
    description: "DNS server and client tools (BIND)"
    packages:
      - BR2_PACKAGE_BIND=y
      - BR2_PACKAGE_BIND_TOOLS=y

  storage:
    description: "Storage and filesystem utilities"
    packages:
      - BR2_PACKAGE_UTIL_LINUX=y
      - BR2_PACKAGE_UTIL_LINUX_BINARIES=y
      - BR2_PACKAGE_UTIL_LINUX_AGETTY=y
      - BR2_PACKAGE_UTIL_LINUX_MOUNT=y
      - BR2_PACKAGE_UTIL_LINUX_MOUNTPOINT=y
      - BR2_PACKAGE_UTIL_LINUX_LOSETUP=y
      - BR2_PACKAGE_E2FSPROGS=y
      - BR2_PACKAGE_E2FSPROGS_FSCK=y
      - BR2_PACKAGE_E2FSPROGS_RESIZE2FS=y
      - BR2_PACKAGE_KMOD=y
      - BR2_PACKAGE_KMOD_TOOLS=y
      - BR2_PACKAGE_OPEN_ISCSI=y

  ssh:
    description: "SSH server (Dropbear — small footprint)"
    packages:
      - BR2_PACKAGE_DROPBEAR=y

  python:
    description: "Python 3 runtime with common extensions"
    packages:
      - BR2_PACKAGE_PYTHON3=y
      - BR2_PACKAGE_PYTHON3_SSL=y
      - BR2_PACKAGE_PYTHON3_ZLIB=y
      - BR2_PACKAGE_PYTHON3_PYEXPAT=y
      - BR2_PACKAGE_PYTHON3_READLINE=y
      - BR2_PACKAGE_PYTHON3_SQLITE=y
      - BR2_PACKAGE_PYTHON_PIP=y

  python-web:
    description: "Python web framework stack (FastAPI + Uvicorn + SQLAlchemy …)"
    packages:
      - BR2_PACKAGE_PYTHON_ALEMBIC=y
      - BR2_PACKAGE_PYTHON_AIOSQLITE=y
      - BR2_PACKAGE_PYTHON_ASYNCSSH=y
      - BR2_PACKAGE_PYTHON_BCRYPT=y
      - BR2_PACKAGE_PYTHON_BOTO3=y
      - BR2_PACKAGE_PYTHON_CRYPTOGRAPHY=y
      - BR2_PACKAGE_PYTHON_DATEUTIL=y
      - BR2_PACKAGE_PYTHON_DJANGO=y
      - BR2_PACKAGE_PYTHON_DOTENV=y
      - BR2_PACKAGE_PYTHON_FASTAPI=y
      - BR2_PACKAGE_PYTHON_GUNICORN=y
      - BR2_PACKAGE_PYTHON_HTTPX=y
      - BR2_PACKAGE_PYTHON_ITSDANGEROUS=y
      - BR2_PACKAGE_PYTHON_JINJA2=y
      - BR2_PACKAGE_PYTHON_PACKAGING=y
      - BR2_PACKAGE_PYTHON_PASSLIB=y
      - BR2_PACKAGE_PYTHON_PYDANTIC=y
      - BR2_PACKAGE_PYTHON_PYJWT=y
      - BR2_PACKAGE_PYTHON_PYYAML=y
      - BR2_PACKAGE_PYTHON_REQUESTS=y
      - BR2_PACKAGE_PYTHON_SQLALCHEMY=y
      - BR2_PACKAGE_PYTHON_STARLETTE=y
      - BR2_PACKAGE_PYTHON_UVICORN=y

  ovs:
    description: "Open vSwitch userspace tools and OVSDB server"
    packages:
      - BR2_PACKAGE_OPENVSWITCH=y

  wireless:
    description: "Wi-Fi client tools (wpa_supplicant, iw) — for Pi Zero 2W"
    packages:
      - BR2_PACKAGE_WPA_SUPPLICANT=y
      - BR2_PACKAGE_WPA_SUPPLICANT_NL80211=y
      - BR2_PACKAGE_WPA_SUPPLICANT_CLI=y
      - BR2_PACKAGE_WPA_SUPPLICANT_PASSPHRASE=y
      - BR2_PACKAGE_IW=y
      - BR2_PACKAGE_WIRELESS_TOOLS=y
      - BR2_PACKAGE_BRCMFMAC_SDIO_FIRMWARE_RPI=y
      - BR2_PACKAGE_BRCMFMAC_SDIO_FIRMWARE_RPI_WIFI=y

  mininet:
    description: "Mininet network manager — interface config, DHCP server (opt-in, QEMU x86)"
    packages:
      - BR2_PACKAGE_MININET=y

  rootfs:
    description: "Rootfs output format (required — produces rootfs.tar)"
    packages:
      - BR2_TARGET_ROOTFS_TAR=y
      - BR2_TARGET_ROOTFS_TAR_NONE=y
