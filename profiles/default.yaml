name: default
target: qemu-virt
branding:
  name: 4stm4 netOS
  id: 4stm4-netos
  version: 0.1.0
  hostname: 4stm4-netos
network:
  eth0:
    mode: dhcp
    address: ''
    gateway: ''
    dns: ''
  wifi:
    country: US
    ssid: ''
    psk: ''
    bootstrap: true
packages:
  enabled: []
  custom: []
webui:
  source: git
  git_url: https://github.com/4stm4/testum.git
  git_ref: main
  source_dir: ''
  port: 8080
  data_dir: /opt/testum
  database_url: sqlite:////opt/testum/testum.db
  pip_mode: never
  admin_username: admin
  admin_password: ''
  health_path: /health
  app_module: app.main:app
image:
  size_mb: 512
  boot_mb: 64
